<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#grad)"/>
  
  <!-- WordPress icon -->
  <circle cx="180" cy="150" r="50" fill="#21759b" opacity="0.3"/>
  <circle cx="180" cy="150" r="40" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="180" cy="150" r="8" fill="#ffffff"/>
  <rect x="172" y="142" width="16" height="50" fill="#ffffff" transform="rotate(0 180 150)"/>
  <rect x="172" y="142" width="16" height="50" fill="#ffffff" transform="rotate(90 180 150)"/>
  
  <!-- Title -->
  <text x="280" y="130" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">
    WordPress Post Meta
  </text>
  
  <!-- Subtitle -->
  <text x="280" y="180" font-family="Arial, sans-serif" font-size="28" fill="#ecf0f1">
    Modern REST API &amp; Admin Utilities
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(280, 210)">
    <rect width="110" height="30" rx="4" fill="#27ae60" opacity="0.9"/>
    <text x="55" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">REST API</text>
  </g>
  
  <g transform="translate(410, 210)">
    <rect width="110" height="30" rx="4" fill="#e74c3c" opacity="0.9"/>
    <text x="55" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Columns</text>
  </g>
  
  <g transform="translate(540, 210)">
    <rect width="110" height="30" rx="4" fill="#9b59b6" opacity="0.9"/>
    <text x="55" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Quick Edit</text>
  </g>
  
  <g transform="translate(670, 210)">
    <rect width="110" height="30" rx="4" fill="#f39c12" opacity="0.9"/>
    <text x="55" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Gutenberg</text>
  </g>
</svg>
